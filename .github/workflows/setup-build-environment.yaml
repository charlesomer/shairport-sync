on:
  workflow_call:
    outputs:
      SHAIRPORT_SYNC_BRANCH:
        description: "The SPS branch."
        value: ${{ jobs.setup-build-environment.outputs.SHAIRPORT_SYNC_BRANCH }}
      DOCKER_PLATFORMS:
        description: "The docker platforms."
        value: ${{ jobs.setup-build-environment.outputs.DOCKER_PLATFORMS }}
      IMAGE_TAG_BASE:
        description: "First part of the docker tag (e.g. 'rolling' or 'development')"
        value: ${{ jobs.setup-build-environment.outputs.IMAGE_TAG_BASE }}
      NQPTP_BRANCH:
        description: "The NQPTP branch."
        value: ${{ jobs.setup-build-environment.outputs.NQPTP_BRANCH }}

env:
  DOCKER_PLATFORMS: linux/386,linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64
  NQPTP_BRANCH: main
  
jobs:
  setup-build-environment:
    runs-on: ubuntu-22.04
    outputs:
      SHAIRPORT_SYNC_BRANCH: ${{ steps.set-outputs.outputs.SHAIRPORT_SYNC_BRANCH }}
      IMAGE_TAG_BASE: ${{ steps.set-outputs.outputs.IMAGE_TAG_BASE }}
      NQPTP_BRANCH: ${{ steps.set-outputs.outputs.NQPTP_BRANCH }}
      DOCKER_PLATFORMS: ${{ steps.set-outputs.outputs.DOCKER_PLATFORMS }}
    steps:
      - name: Set SHAIRPORT_SYNC_BRANCH env.
        run: echo "SHAIRPORT_SYNC_BRANCH=${GITHUB_REF##*/}" >> "$GITHUB_ENV"

      - name: Checkout Repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          ref: ${{github.event.pull_request.head.ref}}
          repository: ${{github.event.pull_request.head.repo.full_name}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.3.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Is branch "master"?
        if: ${{ env.SHAIRPORT_SYNC_BRANCH == 'master' }}
        run: |
          echo "IMAGE_TAG_BASE=rolling" >> "$GITHUB_ENV"

      - name: Is branch "development"?
        if: ${{ env.SHAIRPORT_SYNC_BRANCH == 'development' }}
        run: |
          echo "NQPTP_BRANCH=development" >> "$GITHUB_ENV"
          echo "IMAGE_TAG_BASE=development" >> "$GITHUB_ENV"

      - name: Set outputs.
        id: set-outputs
        run: |
          echo "SHAIRPORT_SYNC_BRANCH=${{ env.SHAIRPORT_SYNC_BRANCH }}" >> "$GITHUB_OUTPUT"
          echo "DOCKER_PLATFORMS=${{ env.DOCKER_PLATFORMS }}" >> "$GITHUB_OUTPUT"
          echo "NQPTP_BRANCH=${{ env.NQPTP_BRANCH }}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG_BASE=${{ env.IMAGE_TAG_BASE }}" >> "$GITHUB_OUTPUT"
